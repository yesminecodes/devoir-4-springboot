<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="utf-8">
    <title>Liste des Games</title>
    <link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
</head>
<body>
<div th:replace="template"></div>
<div class="container">
    <div class="card">
        <div class="card-header">
            Liste des Games
        </div>
        <div class="card-body">
            <table class="table table-striped">
                <tr>
                    <th>ID</th><th>Nom Game</th><th>Prix</th><th>Date</th><th>Type</th>
                    <th th:if="${isAdmin}" colspan="2">Actions</th>
                </tr>
                <tr th:each="g:${Games.content}">
                    <td th:text="${g.idGame}"></td>
                    <td th:text="${g.nomGame}"></td>
                    <td th:text="${g.prixGame}"></td>
                    <td th:text="${g.dateCreation}"></td>
                    <td th:if="${g.type != null}" th:text="${g.type.nomType}"></td>
                    <td th:if="${g.type == null}" th:text="'Pas de Catégorie'"></td>
                    <td th:if="${isAdmin}">
                        <a class="btn btn-danger" onclick="return confirm('Etes-vous sûr ?')"
                           th:href="@{supprimerGame(id=${g.idGame}, page=${currentPage}, size=${size})}">Supprimer</a>
                    </td>
                    <td th:if="${isAdmin}">
                        <a class="btn btn-success"
                           th:href="@{modifierGame(id=${g.idGame}, page=${currentPage}, size=${size})}">Editer</a>
                    </td>
                </tr>
            </table>
            <ul class="nav nav-pills">
                <li th:each="page,status:${pages}">
                    <a th:class="${status.index==currentPage ? 'btn btn-primary' : 'btn'}"
                       th:href="@{ListeGames(page=${status.index}, size=${size})}"
                       th:text="${status.index}"></a>
                </li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
